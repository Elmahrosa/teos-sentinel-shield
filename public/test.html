<!DOCTYPE html>
<html>
<head>
  <title>TEOS Sentinel — Quick Test</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    textarea { width: 100%; height: 150px; font-family: monospace; padding: 10px; }
    button { background: #76b900; color: white; border: none; padding: 12px 24px; font-weight: bold; cursor: pointer; margin: 10px 0; }
    .result { background: #f5f5f5; padding: 15px; border-radius: 6px; margin-top: 15px; display: none; }
    .BLOCK { border-left: 4px solid #ef4444; }
    .WARN { border-left: 4px solid #f59e0b; }
    .ALLOW { border-left: 4px solid #22c55e; }
  </style>
</head>
<body>
  <h2>🛡️ TEOS Sentinel — Quick Code Test</h2>
  <p>Paste code to validate (runs in &lt;2s):</p>
  
  <textarea id="code" placeholder="eval(require('child_process'))"></textarea>
  <br>
  <input type="text" id="token" placeholder="x-ci-token (optional)" style="width:100%; padding:8px; margin:5px 0;">
  <br>
  <button onclick="scan()">▶ Validate Code</button>
  
  <div id="result" class="result">
    <strong>Decision:</strong> <span id="decision"></span><br>
    <strong>Score:</strong> <span id="score"></span>/100<br>
    <strong>Findings:</strong> <pre id="findings"></pre>
  </div>

  <script>
    async function scan() {
      const code = document.getElementById('code').value;
      const token = document.getElementById('token').value;
      const resultDiv = document.getElementById('result');
      
      resultDiv.style.display = 'block';
      document.getElementById('decision').textContent = 'Scanning...';
      
      try {
        const res = await fetch('https://teoslinker.railway.app/api/ci/scan', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-ci-token': token
          },
          body: JSON.stringify({ code })
        });
        const data = await res.json();
        
        document.getElementById('decision').textContent = data.decision;
        document.getElementById('score').textContent = data.score;
        document.getElementById('findings').textContent = JSON.stringify(data.findings, null, 2);
        
        resultDiv.className = 'result ' + data.decision;
      } catch (e) {
        document.getElementById('decision').textContent = 'Error';
        document.getElementById('findings').textContent = e.message;
      }
    }
  </script>
</body>
</html>
