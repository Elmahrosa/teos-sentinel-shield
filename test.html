<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEOS Sentinel — Quick Code Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
    }
    .header { text-align: center; margin-bottom: 30px; }
    h1 { color: #2d3748; font-size: 32px; margin-bottom: 10px; }
    .subtitle { color: #718096; }
    textarea {
      width: 100%;
      height: 180px;
      font-family: 'Courier New', monospace;
      padding: 15px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      margin: 15px 0;
    }
    .validate-btn {
      background: linear-gradient(135deg, #76b900 0%, #5a8f00 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
    }
    .validate-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(118,185,0,0.3); }
    .result {
      margin-top: 25px;
      padding: 20px;
      border-radius: 8px;
      display: none;
    }
    .result.BLOCK { background: #fff5f5; border-left: 5px solid #e53e3e; }
    .result.WARN { background: #fffff0; border-left: 5px solid #d69e2e; }
    .result.ALLOW { background: #f0fff4; border-left: 5px solid #38a169; }
    .result.ERROR { background: #fff5f5; border-left: 5px solid #e53e3e; }
    .decision-BLOCK { color: #e53e3e; font-weight: 800; font-size: 20px; }
    .decision-WARN { color: #d69e2e; font-weight: 700; }
    .decision-ALLOW { color: #38a169; font-weight: 700; }
    pre { background: #f7fafc; padding: 15px; border-radius: 6px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛡️ TEOS Sentinel — Quick Code Test</h1>
      <p class="subtitle">Deterministic AI Execution Firewall</p>
    </div>
    <textarea id="code" placeholder="eval(require('child_process'))"></textarea>
    <button class="validate-btn" onclick="scan()">▶ Validate Code</button>
    <div id="result" class="result">
      <div><strong>Decision:</strong> <span id="decision"></span></div>
      <div><strong>Score:</strong> <span id="score"></span>/100</div>
      <div><strong>Findings:</strong> <pre id="findings"></pre></div>
    </div>
  </div>
  <script>
    async function scan() {
      const code = document.getElementById('code').value.trim();
      const resultDiv = document.getElementById('result');
      const decisionSpan = document.getElementById('decision');
      const scoreSpan = document.getElementById('score');
      const findingsPre = document.getElementById('findings');

      if (!code) { alert('Please enter code to scan'); return; }

      resultDiv.style.display = 'block';
      resultDiv.className = 'result';
      decisionSpan.textContent = 'Scanning...';
      decisionSpan.className = '';
      
      try {
        const res = await fetch('https://teoslinker-bot.railway.app/api/ci/scan', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        const data = await res.json();
        
        decisionSpan.textContent = data.decision || 'ERROR';
        decisionSpan.className = 'decision-' + (data.decision || 'ERROR');
        scoreSpan.textContent = data.score || 0;
        findingsPre.textContent = JSON.stringify(data.findings, null, 2);
        resultDiv.className = 'result ' + (data.decision || 'ERROR');
      } catch (e) {
        decisionSpan.textContent = 'Error';
        decisionSpan.className = 'decision-ERROR';
        findingsPre.textContent = 'Failed to fetch: ' + e.message;
        resultDiv.className = 'result ERROR';
      }
    }
  </script>
</body>
</html>
