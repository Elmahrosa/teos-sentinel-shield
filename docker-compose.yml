services:
  core-engine:
    build:
      context: ./core-engine
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - core-engine

  gateway-bot:
    build:
      context: ./integrations/gateway-bot
      dockerfile: Dockerfile
    ports:
      - "3001:3001"

  data-firewall:
    build:
      context: ./integrations/data-firewall
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
