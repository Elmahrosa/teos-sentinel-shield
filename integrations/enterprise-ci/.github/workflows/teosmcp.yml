name: TeosMCP Decision Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  teosmcp-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1

      - name: Compute diff
        id: diff
        run: |
          git diff --unified=0 origin/${{ github.base_ref }}...HEAD > /tmp/pr.diff
          echo "diff_path=/tmp/pr.diff" >> $GITHUB_OUTPUT

      - name: TeosMCP gate
        env:
          TEOSMCP_URL: ${{ secrets.TEOSMCP_URL }}
          TEOSMCP_API_KEY: ${{ secrets.TEOSMCP_API_KEY }}
        run: |
          bash scripts/teosmcp-gate.sh "${{ steps.diff.outputs.diff_path }}"
