name: Security Regression Tests

on: [push, pull_request]

jobs:
  regex-fuzzing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - name: Test PII regex for ReDoS
        run: |
          python -c "
          import time
          from core.pii import CARD_RE
          payload = '1' + ' -'*5000 + '2'
          start = time.time()
          CARD_RE.findall(payload)
          elapsed = time.time() - start
          assert elapsed < 1.0, f'ReDoS detected ({elapsed:.2f}s)'
          print(f'OK: Regex completed in {elapsed:.3f}s')
          "

  concurrency-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt pytest-xdist
      - name: Run concurrent tests
        env:
          PII_SALT: 0123456789abcdef0123456789abcdef
          API_KEY_SALT: abcdef0123456789abcdef0123456789
          DASHBOARD_ADMIN_PASSWORD: supersecure123
          API_KEY_HASHES_JSON: '[]'
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: pytest tests/ -n 2
